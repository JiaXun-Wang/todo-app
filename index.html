<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo + 你画我猜</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<meta name="theme-color" content="#007aff">
<meta name="description" content="Todo + 你画我猜 - PWA">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<!-- Animal decorations -->
<div class="animal-paw p1">🐾</div>
<div class="animal-paw p2">🐾</div>
<div class="animal-paw p3">🐾</div>
<div class="animal-bird">🐦</div>

<div class="app">
  <!-- Tab Navigation -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('todo')">📋 待办事项</button>
    <button class="tab-btn" onclick="switchTab('game')">🎨 你画我猜</button>
  </div>

  <!-- ==================== TODO PANEL ==================== -->
  <div class="tab-panel active" id="panel-todo">
    <div class="header">
      <h1>🐱 待办事项</h1>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="handleImport()">📥 导入</button>
        <button class="btn btn-outline btn-sm" onclick="exportData()">💾 保存</button>
        <button class="btn btn-outline btn-sm" id="notifEnableBtn" onclick="requestNotificationPermission()" style="display:none;" title="开启通知提醒">🔔 通知</button>
        <button class="btn btn-outline btn-sm" onclick="toggleDarkMode()" title="深色模式" style="font-size:16px;padding:5px 8px;" id="themeToggleBtn">🌙</button>
        <button class="btn btn-outline btn-sm" onclick="openThemeSettings()" title="主题设置" style="font-size:14px;padding:5px 8px;">🎨</button>
        <span style="font-size:13px;color:var(--text-secondary);margin-right:4px;" id="headerUserName"></span>
        <button class="btn btn-outline btn-sm" id="headerAdminBtn" style="display:none;" onclick="openAdminPanel()">👑 管理</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ 新建</button>
        <button class="btn btn-danger btn-sm" onclick="handleLogout()">退出</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索待办事项..." oninput="renderTodos()">
      </div>
      <select class="filter-select" id="statusFilter" onchange="renderTodos()">
        <option value="all">全部</option>
        <option value="active">进行中</option>
        <option value="completed">已完成</option>
        <option value="overdue">已逾期</option>
      </select>
      <select class="filter-select" id="priorityFilter" onchange="renderTodos()">
        <option value="all">所有优先级</option>
        <option value="high">高优先级</option>
        <option value="medium">中优先级</option>
        <option value="low">低优先级</option>
      </select>
    </div>

    <div id="categoryBar" class="category-list"></div>

    <div class="stats-bar">
      <span id="statsText"></span>
      <div class="batch-actions hidden" id="batchActions">
        <button class="btn btn-outline btn-sm" onclick="batchMarkComplete()">✓ 批量完成</button>
        <button class="btn btn-danger btn-sm" onclick="batchDelete()">🗑 批量删除</button>
        <button class="select-all-btn" onclick="toggleSelectAll()">全选</button>
      </div>
    </div>

    <div class="todo-list" id="todoList"></div>
  </div>

  <!-- ==================== GAME PANEL ==================== -->
  <div class="tab-panel" id="panel-game">
    <div id="gameLobby" class="game-lobby">
      <h2>🎨 你画我猜</h2>
      <div class="lobby-animals">🐶 🐱 🐰 🐼 🦊</div>
      <p style="color:var(--text-secondary);margin-bottom:20px;">和朋友一起玩！一人画，其他人猜。</p>
      <div class="form-group">
        <label>你的昵称</label>
        <input type="text" id="gameNickname" placeholder="输入昵称..." maxlength="12" autocomplete="off">
      </div>

      <!-- Create Room -->
      <div id="createRoomArea" style="max-width:360px;margin:0 auto;">
        <div class="form-group">
          <label>房间名称（可选）</label>
          <input type="text" id="createRoomName" placeholder="例如: 快乐画室" maxlength="20" autocomplete="off">
        </div>
        <div class="form-group">
          <label>自定义房间号（可选，英文+数字）</label>
          <input type="text" id="createRoomCode" placeholder="留空则自动生成" maxlength="20" autocomplete="off" style="font-family:monospace;">
        </div>
        <button class="btn btn-primary btn-block" onclick="createRoom()">🏠 创建房间</button>
      </div>

      <div style="margin-top:16px;max-width:360px;margin-left:auto;margin-right:auto;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="flex:1;height:1px;background:var(--border);"></div>
          <span style="font-size:12px;color:var(--text-tertiary);">或者</span>
          <div style="flex:1;height:1px;background:var(--border);"></div>
        </div>
      </div>

      <!-- Join Room -->
      <div id="joinRoomArea" style="max-width:360px;margin:0 auto;">
        <div class="form-group">
          <label>房间号</label>
          <input type="text" id="joinRoomCode" placeholder="输入朋友的房间号..." maxlength="30" autocomplete="off">
        </div>
        <button class="btn btn-outline btn-block" onclick="joinRoom()">🚪 加入房间</button>
      </div>
    </div>

    <div id="gameRoom" style="display:none;">
      <div class="game-room-info">
        <div>
          <span style="font-size:12px;color:var(--text-secondary);">房间</span>
          <span style="font-weight:700;font-size:16px;margin-left:4px;" id="roomNameDisplay"></span>
          <span style="font-size:12px;color:var(--text-tertiary);margin-left:6px;">#<span id="roomCodeDisplay"></span></span>
          <button class="btn btn-outline btn-sm" onclick="copyShareLink()" style="margin-left:8px;" title="复制分享链接">🔗 分享</button>
        </div>
        <div class="player-list" id="playerList"></div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-size:12px;color:var(--text-secondary);">总局数:</span>
          <select id="totalRoundsSelect" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:inherit;">
            <option value="3">3局</option>
            <option value="5" selected>5局</option>
            <option value="8">8局</option>
            <option value="10">10局</option>
            <option value="0">无限</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="reconnectRoom()" title="重新连接">🔄</button>
          <button class="btn btn-primary btn-sm" id="startGameBtn" onclick="startGame()" style="display:none;">开始游戏</button>
          <button class="btn btn-outline btn-sm" id="leaveRoomBtn" onclick="leaveRoom()">离开</button>
        </div>
      </div>

      <div id="gamePlayArea" style="display:none;">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
          <div class="game-word-display" id="wordDisplay" style="flex:1;min-width:200px;"></div>
          <div id="timerDisplay" style="font-size:24px;font-weight:700;color:var(--accent);min-width:50px;text-align:center;font-variant-numeric:tabular-nums;">⏱ 80</div>
          <div id="roundDisplay" style="font-size:13px;color:var(--text-secondary);white-space:nowrap;"></div>
        </div>

        <div class="game-main">
          <div class="game-canvas-area">
            <canvas id="drawCanvas" width="600" height="400"></canvas>
            <div class="drawing-tools" id="drawingTools">
              <button class="tool-btn active" data-tool="pen" title="画笔">✏️</button>
              <button class="tool-btn" data-tool="eraser" title="橡皮">🧹</button>
              <button class="tool-btn" data-tool="line" title="直线">📏</button>
              <button class="tool-btn" data-tool="rect" title="矩形">⬜</button>
              <button class="tool-btn" data-tool="circle" title="圆形">⭕</button>
              <button class="tool-btn" data-tool="fill" title="填充" onclick="floodFill()">🪣</button>
              <span class="tool-divider"></span>
              <button class="tool-btn" onclick="undoDraw()" title="撤销">↩️</button>
              <span class="tool-divider"></span>
              <input type="color" id="penColor" value="#1d1d1f" title="颜色">
              <input type="range" id="penSize" min="1" max="20" value="3" title="粗细">
              <span class="tool-divider"></span>
              <button class="tool-btn" onclick="clearCanvas()" title="清空">🗑</button>
            </div>
          </div>

          <div class="game-sidebar">
            <div class="scoreboard">
              <h4>🏆 得分榜</h4>
              <div id="scoreList"></div>
            </div>
            <div class="game-chat">
              <div class="chat-messages" id="chatMessages"></div>
              <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="输入猜测..." maxlength="50" onkeydown="if(event.key==='Enter')sendGuess()">
                <button class="btn btn-primary btn-sm" onclick="sendGuess()">发送</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Todo Modal -->
<div class="modal-overlay" id="todoModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">新建待办</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="todoTitle" placeholder="输入待办事项...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>优先级</label>
        <select id="todoPriority">
          <option value="low">低</option>
          <option value="medium" selected>中</option>
          <option value="high">高</option>
        </select>
      </div>
      <div class="form-group">
        <label>截止日期</label>
        <input type="date" id="todoDueDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>提醒时间</label>
        <input type="datetime-local" id="todoReminder">
      </div>
    </div>
    <div class="form-group">
      <label>分类</label>
      <input type="text" id="todoCategory" placeholder="输入或选择已有分类..." list="categoryDatalist">
      <datalist id="categoryDatalist"></datalist>
    </div>
    <div class="form-group">
      <label>标签（逗号分隔）</label>
      <input type="text" id="todoTags" placeholder="例如: 工作, 重要, 紧急">
	    </div>
	    <div class="form-group">
	      <label>重复</label>
	      <select id="todoRepeat">
	        <option value="">不重复</option>
	        <option value="daily">每天</option>
	        <option value="weekly">每周</option>
	        <option value="monthly">每月</option>
	      </select>
	    </div>
	    <div class="form-group">
	      <label>备注</label>
	      <textarea id="todoNote" placeholder="添加备注..." rows="2" style="resize:vertical;"></textarea>
    </div>
	    <div class="form-group" id="subtaskGroup" style="display:none;">
	      <label>子任务</label>
	      <div id="subtaskList"></div>
	    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTodo()">保存</button>
    </div>
  </div>
</div>


<!-- Announcement Bar -->
<div id="announceBar" style="display:none;background:var(--accent-light);color:var(--accent);padding:8px 16px;text-align:center;font-size:13px;border-radius:var(--radius-sm);margin-bottom:12px;position:relative;">
  <span id="announceText"></span>
  <button onclick="dismissAnnounce()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--accent);">×</button>
</div>

<!-- Profile Panel -->
<div class="admin-panel-overlay" id="profilePanel" style="display:none;" onclick="if(event.target===this)closeProfile()">
  <div class="admin-panel">
    <h3>👤 个人主页</h3>
    <div style="text-align:center;margin-bottom:16px;">
      <div id="profileAvatar" style="font-size:60px;cursor:pointer;margin-bottom:8px;" onclick="cycleAvatar()" title="点击切换头像">🐱</div>
      <div style="font-size:18px;font-weight:700;" id="profileName"></div>
      <div style="font-size:13px;color:var(--text-secondary);" id="profileRole"></div>
      <div style="margin-top:8px;">
        <input type="text" id="profileSignature" placeholder="写个签名..." maxlength="50" style="text-align:center;padding:6px 12px;border-radius:16px;border:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;width:80%;background:var(--bg);" onchange="saveSignature()">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;">
        <div style="font-size:24px;font-weight:700;color:var(--accent);" id="statDays">0</div>
        <div style="font-size:12px;color:var(--text-secondary);">使用天数</div>
      </div>
      <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;">
        <div style="font-size:24px;font-weight:700;color:var(--success);" id="statCompleted">0</div>
        <div style="font-size:12px;color:var(--text-secondary);">已完成待办</div>
      </div>
      <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;">
        <div style="font-size:24px;font-weight:700;color:var(--warning);" id="statTotal">0</div>
        <div style="font-size:12px;color:var(--text-secondary);">待办总数</div>
      </div>
      <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#af52de;" id="statGameWins">0</div>
        <div style="font-size:12px;color:var(--text-secondary);">游戏猜对</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="openChangePassword()">🔒 修改密码</button>
      <button class="btn btn-outline" onclick="closeProfile()">关闭</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="admin-panel-overlay" id="changePwdPanel" style="display:none;" onclick="if(event.target===this)closeChangePwd()">
  <div class="admin-panel">
    <h3>🔒 修改密码</h3>
    <div id="changePwdError" class="auth-error"></div>
    <div id="changePwdSuccess" class="auth-success"></div>
    <div class="form-group">
      <label>旧密码</label>
      <input type="password" id="oldPassword" placeholder="输入旧密码...">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="newPassword" placeholder="输入新密码（至少4位）...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeChangePwd()">取消</button>
      <button class="btn btn-primary" onclick="handleChangePassword()">确认修改</button>
    </div>
  </div>
</div>
<!-- Auth Overlay -->
<!-- Auth Overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-bg-animate"></div>
  <div class="auth-card" id="authCardLogin">
    <div class="auth-animals">🐱 🐶 🐰 🐼 🦊</div>
    <h2>欢迎回来</h2>
    <p class="auth-subtitle">登录你的账号</p>
    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>
    <div id="lockoutTimer" class="auth-error" style="display:none;"></div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginName" placeholder="输入用户名..." maxlength="20" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="password-wrap">
        <input type="password" id="loginPassword" placeholder="输入密码..." onkeydown="if(event.key==='Enter')handleLogin()">
        <button class="pwd-toggle" onclick="togglePassword('loginPassword', this)" type="button">👁</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:13px;color:var(--text-secondary);">
      <input type="checkbox" id="rememberMe" style="width:16px;height:16px;cursor:pointer;">
      <label for="rememberMe" style="cursor:pointer;">记住我（7天内自动登录）</label>
    </div>
    <button class="btn-auth" onclick="handleLogin()">登 录</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
      还没有账号？<a href="#" onclick="event.preventDefault();switchAuthCard('register')" style="color:var(--accent);text-decoration:none;">立即注册</a>
    </p>
  </div>

  <div class="auth-card" id="authCardRegister" style="display:none;">
    <div class="auth-animals">✨ 🎨 ✨</div>
    <h2>创建账号</h2>
    <p class="auth-subtitle">注册后需等待管理员审批</p>
    <div id="regError" class="auth-error"></div>
    <div id="regSuccess" class="auth-success"></div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="registerName" placeholder="设置用户名（2-20字符）..." maxlength="20" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="password-wrap">
        <input type="password" id="registerPassword" placeholder="设置密码（至少4位）..." onkeydown="if(event.key==='Enter')handleRegister()">
        <button class="pwd-toggle" onclick="togglePassword('registerPassword', this)" type="button">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <div class="password-wrap">
        <input type="password" id="registerPassword2" placeholder="再次输入密码..." onkeydown="if(event.key==='Enter')handleRegister()">
        <button class="pwd-toggle" onclick="togglePassword('registerPassword2', this)" type="button">👁</button>
      </div>
    </div>
    <button class="btn-auth" onclick="handleRegister()">注 册</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
      已有账号？<a href="#" onclick="event.preventDefault();switchAuthCard('login')" style="color:var(--accent);text-decoration:none;">去登录</a>
    </p>
  </div>

  <!-- Registration pending card -->
  <div class="auth-card" id="authCardPending" style="display:none;">
    <div class="auth-animals">⏳</div>
    <h2>等待审批</h2>
    <p class="auth-subtitle">你的注册申请已提交，请等待管理员审批</p>
    <p style="text-align:center;margin-top:8px;font-size:13px;color:var(--text-secondary);">
      审批通过后，返回此页面即可登录
    </p>
    <button class="btn-auth" onclick="switchAuthCard('login')" style="margin-top:20px;">返回登录</button>
  </div>
</div>


<!-- Theme Settings Panel -->
<div class="theme-settings-overlay" id="themeSettings" style="display:none;" onclick="if(event.target===this)closeThemeSettings()">
  <div class="theme-settings">
    <h3>🎨 主题设置</h3>
    <div class="theme-row">
      <span>深色模式</span>
      <label style="position:relative;display:inline-block;width:48px;height:26px;">
        <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()" style="opacity:0;width:0;height:0;">
        <span style="position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:26px;transition:0.3s;" id="darkModeSlider"></span>
        <span style="position:absolute;content:'';height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;" id="darkModeKnob"></span>
      </label>
    </div>
    <div class="theme-row">
      <span>主题色</span>
      <div class="accent-picker">
        <div class="accent-dot blue active" onclick="setAccent('blue')" title="蓝色"></div>
        <div class="accent-dot green" onclick="setAccent('green')" title="绿色"></div>
        <div class="accent-dot purple" onclick="setAccent('purple')" title="紫色"></div>
        <div class="accent-dot orange" onclick="setAccent('orange')" title="橙色"></div>
      </div>
    </div>
    <div class="theme-row">
      <span>背景图片</span>
      <div class="bg-upload-row">
        <input type="text" id="bgImageUrl" placeholder="输入图片URL..." onchange="setBgImage()">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('bgImageFile').click()">本地上传</button>
        <input type="file" id="bgImageFile" accept="image/*" style="display:none;" onchange="handleBgUpload()">
      </div>
    </div>
    <div class="theme-row" id="bgClearRow" style="display:none;">
      <span></span>
      <button class="btn btn-danger btn-sm" onclick="clearBgImage()">清除背景</button>
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-outline" onclick="closeThemeSettings()">关闭</button>
    </div>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel-overlay" id="adminPanel" style="display:none;" onclick="if(event.target===this)closeAdminPanel()">
  <div class="admin-panel">
    <h3>👑 用户管理</h3>
    <div id="adminUserList"></div>
		    <div style="margin-bottom:12px;"><button class="btn btn-outline btn-sm" onclick="publishAnnounce()">📢 发布公告</button></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-outline" onclick="closeAdminPanel()">关闭</button>
    </div>
  </div>
</div>


<script src="globals.js"></script>
<script src="auth.js"></script>
<script src="admin.js"></script>
<script src="theme.js"></script>
<script src="cloud-sync.js"></script>
<script src="subtasks.js"></script>
<script src="announcements.js"></script>
<script src="change-password.js"></script>
<script src="todo.js"></script>
<script src="game.js"></script>
<script src="profile.js"></script>
<script src="init.js"></script>
</body>
</html>
