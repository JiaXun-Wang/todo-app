<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo + 你画我猜</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f6f8; --card-bg: #ffffff; --text: #1d1d1f;
  --text-secondary: #86868b; --text-tertiary: #aeaeb2; --border: #e5e5ea;
  --accent: #007aff; --accent-light: #e8f2ff; --danger: #ff3b30;
  --danger-light: #ffe5e3; --success: #34c759; --warning: #ff9500;
  --warning-light: #fff3e0; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 12px; --radius-sm: 8px; --radius-xs: 6px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; justify-content: center; padding: 40px 20px;
}

.app { width: 100%; max-width: 850px; }

/* Tab Nav */
.tab-nav {
  display: flex; gap: 4px; margin-bottom: 28px; background: var(--card-bg);
  border-radius: var(--radius); padding: 4px; box-shadow: var(--shadow-sm);
}
.tab-btn {
  flex: 1; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
  font-size: 15px; font-weight: 500; font-family: inherit; background: transparent;
  color: var(--text-secondary); transition: all 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Animal decorations */
.animal-paw {
  position: fixed; pointer-events: none; opacity: 0.06; font-size: 60px;
  z-index: 0; user-select: none;
}
.animal-paw.p1 { top: 60px; left: 30px; transform: rotate(-20deg); }
.animal-paw.p2 { bottom: 80px; right: 40px; transform: rotate(25deg); }
.animal-paw.p3 { top: 50%; right: 20px; transform: rotate(10deg); font-size: 40px; opacity: 0.04; }
.animal-bird {
  position: fixed; top: 30px; right: 50px; font-size: 28px; pointer-events: none;
  z-index: 0; opacity: 0.08; animation: birdFloat 6s ease-in-out infinite;
}
@keyframes birdFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-15px) rotate(3deg); }
  75% { transform: translateY(-5px) rotate(-3deg); }
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.header-actions { display: flex; gap: 8px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-xs);
  font-size: 14px; font-weight: 500; cursor: pointer; border: none;
  transition: all 0.15s ease; font-family: inherit;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #0068d6; }
.btn-outline { background: var(--card-bg); color: var(--accent); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--accent-light); }
.btn-danger { background: var(--card-bg); color: var(--danger); border: 1px solid var(--border); }
.btn-danger:hover { background: var(--danger-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { opacity: 0.85; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-block { width: 100%; justify-content: center; }

/* Toolbar */
.toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 14px 10px 36px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); font-size: 14px; font-family: inherit;
  background: var(--card-bg); outline: none; transition: border-color 0.15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); font-size: 15px; pointer-events: none;
}
.filter-select {
  padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-size: 14px; font-family: inherit; background: var(--card-bg); outline: none; cursor: pointer;
}
.filter-select:focus { border-color: var(--accent); }

/* Stats + Batch */
.stats-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; font-size: 13px; color: var(--text-secondary);
}
.batch-actions { display: flex; gap: 8px; align-items: center; }
.batch-actions.hidden { display: none; }
.select-all-btn { font-size: 13px; color: var(--accent); cursor: pointer; background: none; border: none; }

/* Todo list */
.todo-list { display: flex; flex-direction: column; gap: 6px; }
.todo-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border);
  transition: all 0.15s ease; cursor: grab; user-select: none;
}
.todo-item:hover { border-color: #c0c0c8; box-shadow: var(--shadow-sm); }
.todo-item:active { cursor: grabbing; }
.todo-item.dragging { opacity: 0.5; background: var(--accent-light); }
.todo-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.todo-item.completed .todo-title { text-decoration: line-through; color: var(--text-tertiary); }
.todo-item.overdue { border-left: 3px solid var(--danger); }

.checkbox {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.checkbox:hover { border-color: var(--accent); }
.checkbox.checked { background: var(--success); border-color: var(--success); }
.checkbox.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }

.todo-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.todo-title { font-size: 15px; font-weight: 500; word-break: break-word; }
.todo-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 12px; }

.tag { padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.tag-category { background: var(--accent-light); color: var(--accent); }
.tag-priority-high { background: var(--danger-light); color: var(--danger); }
.tag-priority-medium { background: var(--warning-light); color: var(--warning); }
.tag-priority-low { background: #e8f5e9; color: #4caf50; }

.due-date { white-space: nowrap; }
.due-date.today { color: var(--warning); font-weight: 600; }
.due-date.overdue { color: var(--danger); font-weight: 600; }
.due-date.normal { color: var(--text-secondary); }
.reminder-tag { color: #8e44ad; font-weight: 500; }

.todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
.todo-actions button {
  width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
  background: transparent; color: var(--text-tertiary); font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.todo-actions button:hover { background: var(--bg); color: var(--text); }
.todo-actions .btn-edit:hover { color: var(--accent); }
.todo-actions .btn-delete:hover { color: var(--danger); }

.select-check {
  width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border);
  flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.select-check.selected { background: var(--accent); border-color: var(--accent); }
.select-check.selected::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* Category */
.category-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.category-chip {
  padding: 4px 10px; border-radius: 100px; font-size: 13px;
  background: var(--bg); border: 1px solid var(--border); cursor: pointer;
  display: flex; align-items: center; gap: 4px; transition: all 0.15s;
}
.category-chip:hover { border-color: var(--accent); }
.category-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.category-chip .chip-count { font-size: 11px; opacity: 0.7; }
.drag-handle { color: var(--text-tertiary); cursor: grab; font-size: 14px; flex-shrink: 0; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--card-bg); border-radius: var(--radius); padding: 24px;
  width: 90%; max-width: 500px; box-shadow: var(--shadow-md);
  animation: slideUp 0.25s ease; max-height: 90vh; overflow-y: auto;
}
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-xs);
  border: 1px solid var(--border); font-size: 14px; font-family: inherit;
  outline: none; background: var(--bg); transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #1d1d1f; color: #fff; padding: 10px 20px; border-radius: 100px;
  font-size: 14px; z-index: 200; animation: slideUp 0.3s ease; box-shadow: var(--shadow-md);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ============ GAME STYLES ============ */
.game-lobby { text-align: center; padding: 20px; }
.game-lobby h2 { font-size: 24px; margin-bottom: 8px; }
.game-lobby .lobby-animals { font-size: 40px; margin-bottom: 16px; letter-spacing: 8px; }
.game-lobby .form-group { text-align: left; max-width: 360px; margin: 0 auto 14px; }
.game-room-info {
  background: var(--card-bg); border-radius: var(--radius); padding: 12px 16px;
  margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; border: 1px solid var(--border);
}
.room-code { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: 2px; }
.player-list { display: flex; gap: 8px; flex-wrap: wrap; }
.player-badge {
  padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 500;
  background: var(--accent-light); color: var(--accent);
}
.player-badge.is-drawer { background: var(--warning-light); color: var(--warning); }
.player-badge.me { border: 2px solid var(--accent); }

.game-main { display: flex; gap: 12px; flex-wrap: wrap; }
.game-canvas-area { flex: 1; min-width: 300px; }
.game-canvas-area canvas {
  width: 100%; border-radius: var(--radius); border: 2px solid var(--border);
  background: #fff; cursor: crosshair; touch-action: none;
}
.drawing-tools {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 8px; padding: 8px 12px; background: var(--card-bg);
  border-radius: var(--radius-sm); border: 1px solid var(--border);
}
.drawing-tools input[type="color"] {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border);
  cursor: pointer; padding: 0;
}
.drawing-tools input[type="range"] { width: 80px; }
.drawing-tools .tool-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
  cursor: pointer; background: var(--card-bg); font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.drawing-tools .tool-btn:hover { border-color: var(--accent); }
.drawing-tools .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tool-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

.game-sidebar {
  width: 240px; display: flex; flex-direction: column; gap: 10px;
}
.game-chat {
  flex: 1; min-height: 200px; background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 10px; display: flex; flex-direction: column;
  overflow: hidden;
}
.chat-messages {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
  font-size: 13px; margin-bottom: 8px;
}
.chat-msg { padding: 4px 8px; border-radius: 6px; word-break: break-word; }
.chat-msg.system { color: var(--text-tertiary); font-style: italic; font-size: 12px; }
.chat-msg.correct { background: #e8f5e9; color: var(--success); font-weight: 600; }
.chat-msg.me { background: var(--accent-light); }
.chat-input-row { display: flex; gap: 6px; }
.chat-input-row input {
  flex: 1; padding: 8px 10px; border-radius: var(--radius-xs);
  border: 1px solid var(--border); font-size: 13px; font-family: inherit; outline: none;
}
.chat-input-row input:focus { border-color: var(--accent); }

.scoreboard {
  background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 10px;
}
.scoreboard h4 { font-size: 13px; margin-bottom: 6px; color: var(--text-secondary); }
.score-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }

.game-word-display {
  text-align: center; padding: 8px; background: var(--card-bg);
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-weight: 700; font-size: 16px; letter-spacing: 2px;
}

@media (max-width: 700px) {
  body { padding: 16px 8px; }
  .header h1 { font-size: 22px; }
  .form-row { flex-direction: column; }
  .game-main { flex-direction: column; }
  .game-sidebar { width: 100%; }
  .game-chat { min-height: 120px; max-height: 200px; }
}

/* Auth Overlay */
.auth-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 300;
}
.auth-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 32px 28px;
  width: 90%; max-width: 400px; box-shadow: var(--shadow-md);
}
.auth-card h2 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.auth-card .auth-subtitle { text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
.auth-tab {
  flex: 1; padding: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 500;
  font-family: inherit; background: var(--bg); color: var(--text-secondary); transition: all 0.15s;
}
.auth-tab.active { background: var(--accent); color: #fff; }
.auth-card .form-group { margin-bottom: 14px; }
.auth-card .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.auth-card .form-group input {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-xs);
  border: 1px solid var(--border); font-size: 14px; font-family: inherit;
  outline: none; background: var(--bg); transition: border-color 0.15s;
}
.auth-card .form-group input:focus { border-color: var(--accent); }
.auth-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 20px; margin-bottom: 8px; }
.auth-success { color: var(--success); font-size: 13px; text-align: center; min-height: 20px; margin-bottom: 8px; }
.btn-auth { width: 100%; padding: 10px; border-radius: var(--radius-xs); font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; background: var(--accent); color: #fff; font-family: inherit;
  transition: opacity 0.15s; }
.btn-auth:hover { opacity: 0.85; }
.btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

/* Admin Panel */
.admin-panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
.admin-panel {
  background: var(--card-bg); border-radius: var(--radius); padding: 24px;
  width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
}
.admin-panel h3 { font-size: 18px; margin-bottom: 16px; }
.admin-user-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  margin-bottom: 6px; gap: 10px;
}
.admin-user-info { flex: 1; min-width: 0; }
.admin-user-name { font-weight: 600; font-size: 14px; }
.admin-user-meta { font-size: 12px; color: var(--text-secondary); }
.admin-user-actions { display: flex; gap: 6px; flex-shrink: 0; }
.badge-status {
  display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500;
}
.badge-pending { background: var(--warning-light); color: var(--warning); }
.badge-approved { background: #e8f5e9; color: #4caf50; }
.badge-admin { background: var(--accent-light); color: var(--accent); }
</style>
</head>
<body>

<!-- Animal decorations -->
<div class="animal-paw p1">🐾</div>
<div class="animal-paw p2">🐾</div>
<div class="animal-paw p3">🐾</div>
<div class="animal-bird">🐦</div>

<div class="app">
  <!-- Tab Navigation -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('todo')">📋 待办事项</button>
    <button class="tab-btn" onclick="switchTab('game')">🎨 你画我猜</button>
  </div>

  <!-- ==================== TODO PANEL ==================== -->
  <div class="tab-panel active" id="panel-todo">
    <div class="header">
      <h1>🐱 待办事项</h1>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="handleImport()">📥 导入</button>
        <button class="btn btn-outline btn-sm" onclick="exportData()">💾 保存</button>
        <span style="font-size:13px;color:var(--text-secondary);margin-right:4px;" id="headerUserName"></span>
        <button class="btn btn-outline btn-sm" id="headerAdminBtn" style="display:none;" onclick="openAdminPanel()">👑 管理</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ 新建</button>
        <button class="btn btn-danger btn-sm" onclick="handleLogout()">退出</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索待办事项..." oninput="renderTodos()">
      </div>
      <select class="filter-select" id="statusFilter" onchange="renderTodos()">
        <option value="all">全部</option>
        <option value="active">进行中</option>
        <option value="completed">已完成</option>
        <option value="overdue">已逾期</option>
      </select>
      <select class="filter-select" id="priorityFilter" onchange="renderTodos()">
        <option value="all">所有优先级</option>
        <option value="high">高优先级</option>
        <option value="medium">中优先级</option>
        <option value="low">低优先级</option>
      </select>
    </div>

    <div id="categoryBar" class="category-list"></div>

    <div class="stats-bar">
      <span id="statsText"></span>
      <div class="batch-actions hidden" id="batchActions">
        <button class="btn btn-outline btn-sm" onclick="batchMarkComplete()">✓ 批量完成</button>
        <button class="btn btn-danger btn-sm" onclick="batchDelete()">🗑 批量删除</button>
        <button class="select-all-btn" onclick="toggleSelectAll()">全选</button>
      </div>
    </div>

    <div class="todo-list" id="todoList"></div>
  </div>

  <!-- ==================== GAME PANEL ==================== -->
  <div class="tab-panel" id="panel-game">
    <div id="gameLobby" class="game-lobby">
      <h2>🎨 你画我猜</h2>
      <div class="lobby-animals">🐶 🐱 🐰 🐼 🦊</div>
      <p style="color:var(--text-secondary);margin-bottom:20px;">和朋友一起玩！一人画，其他人猜。</p>
      <div class="form-group">
        <label>你的昵称</label>
        <input type="text" id="gameNickname" placeholder="输入昵称..." maxlength="12" autocomplete="off">
      </div>

      <!-- Create Room -->
      <div id="createRoomArea" style="max-width:360px;margin:0 auto;">
        <div class="form-group">
          <label>房间名称（可选）</label>
          <input type="text" id="createRoomName" placeholder="例如: 快乐画室" maxlength="20" autocomplete="off">
        </div>
        <div class="form-group">
          <label>自定义房间号（可选，英文+数字）</label>
          <input type="text" id="createRoomCode" placeholder="留空则自动生成" maxlength="20" autocomplete="off" style="font-family:monospace;">
        </div>
        <button class="btn btn-primary btn-block" onclick="createRoom()">🏠 创建房间</button>
      </div>

      <div style="margin-top:16px;max-width:360px;margin-left:auto;margin-right:auto;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="flex:1;height:1px;background:var(--border);"></div>
          <span style="font-size:12px;color:var(--text-tertiary);">或者</span>

<script>
// ==================== AUTH ====================
// Change this to your Vercel deployment URL after first deploy
const API_BASE = 'https://test-9pz7gnl6e-jiaxun-wangs-projects.vercel.app';

let authToken = null;
let currentUser = null;

async function apiCall(path, body = null) {
  const opts = {
    method: body ? 'POST' : 'GET',
    headers: { 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  const res = await fetch(API_BASE + path, opts);
  return res.json();
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('authFormLogin').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('authFormRegister').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('authError').textContent = '';
  document.getElementById('authSuccess').textContent = '';
}

async function handleLogin() {
  const name = document.getElementById('loginName').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!name || !password) { errEl.textContent = '请填写用户名和密码'; return; }
  const btn = document.querySelector('#authFormLogin .btn-auth');
  btn.disabled = true; btn.textContent = '登录中...';
  const res = await apiCall('/api/login', { name, password });
  btn.disabled = false; btn.textContent = '登 录';
  if (res.error) { errEl.textContent = res.error; return; }
  authToken = res.token;
  currentUser = { name: res.name, role: res.role };
  localStorage.setItem('auth_token', authToken);
  localStorage.setItem('auth_user', JSON.stringify(currentUser));
  document.getElementById('authOverlay').style.display = 'none';
  initApp();
}

async function handleRegister() {
  const name = document.getElementById('registerName').value.trim();
  const password = document.getElementById('registerPassword').value;
  const errEl = document.getElementById('authError');
  const sucEl = document.getElementById('authSuccess');
  errEl.textContent = ''; sucEl.textContent = '';
  if (!name || !password) { errEl.textContent = '请填写用户名和密码'; return; }
  if (name.length < 2 || name.length > 20) { errEl.textContent = '用户名需2-20个字符'; return; }
  if (password.length < 4) { errEl.textContent = '密码至少4位'; return; }
  const btn = document.querySelector('#authFormRegister .btn-auth');
  btn.disabled = true; btn.textContent = '注册中...';
  const res = await apiCall('/api/register', { name, password });
  btn.disabled = false; btn.textContent = '注 册';
  if (res.error) { errEl.textContent = res.error; return; }
  sucEl.textContent = res.message;
  document.getElementById('registerName').value = '';
  document.getElementById('registerPassword').value = '';
}

async function verifyToken() {
  const token = localStorage.getItem('auth_token');
  const user = localStorage.getItem('auth_user');
  if (!token || !user) return false;
  authToken = token;
  const res = await apiCall('/api/verify');
  if (res.error) { authToken = null; localStorage.removeItem('auth_token'); localStorage.removeItem('auth_user'); return false; }
  currentUser = { name: res.name, role: res.role };
  localStorage.setItem('auth_user', JSON.stringify(currentUser));
  return true;
}

function handleLogout() {
  authToken = null;
  currentUser = null;
  localStorage.removeItem('auth_token');
  localStorage.removeItem('auth_user');
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('loginName').value = '';
  document.getElementById('loginPassword').value = '';
}

// ==================== ADMIN ====================
async function openAdminPanel() {
  document.getElementById('adminPanel').style.display = 'flex';
  await loadAdminUsers();
}

function closeAdminPanel() {
  document.getElementById('adminPanel').style.display = 'none';
}

async function loadAdminUsers() {
  const list = document.getElementById('adminUserList');
  list.innerHTML = '<p style="color:var(--text-secondary);">加载中...</p>';
  const res = await apiCall('/api/admin/users');
  if (res.error) { list.innerHTML = '<p style="color:var(--danger);">' + res.error + '</p>'; return; }
  const pending = res.users.filter(u => u.status === 'pending');
  const approved = res.users.filter(u => u.status === 'approved');
  let html = '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">待审批: ' + pending.length + ' 人</p>';
  if (res.users.length === 0) {
    html += '<p style="color:var(--text-tertiary);text-align:center;padding:20px;">暂无用户</p>';
  }
  res.users.forEach(u => {
    let badge = '';
    if (u.role === 'admin') badge = '<span class="badge-status badge-admin">管理员</span>';
    else if (u.status === 'pending') badge = '<span class="badge-status badge-pending">待审批</span>';
    else if (u.status === 'approved') badge = '<span class="badge-status badge-approved">已通过</span>';
    let actions = '';
    if (u.status === 'pending') {
      actions = '<button class="btn btn-success btn-sm" onclick="approveUser(\'' + escapeHtml(u.name) + '\')">通过</button>' +
        '<button class="btn btn-danger btn-sm" onclick="rejectUser(\'' + escapeHtml(u.name) + '\')">拒绝</button>';
    }
    html += '<div class="admin-user-row">' +
      '<div class="admin-user-info"><div class="admin-user-name">' + escapeHtml(u.name) + '</div>' +
      '<div class="admin-user-meta">' + badge + ' 注册: ' + (u.createdAt ? u.createdAt.slice(0,10) : '--') + '</div></div>' +
      '<div class="admin-user-actions">' + actions + '</div></div>';
  });
  list.innerHTML = html;
}

async function approveUser(name) {
  const res = await apiCall('/api/admin/approve', { name });
  if (res.error) { showToast(res.error); return; }
  showToast(res.message);
  loadAdminUsers();
}

async function rejectUser(name) {
  if (!confirm('确定拒绝用户 ' + name + ' 的注册吗？')) return;
  const res = await apiCall('/api/admin/reject', { name });
  if (res.error) { showToast(res.error); return; }
  showToast(res.message);
  loadAdminUsers();
}

// ==================== TODO APP ====================
const STORAGE_KEY = 'todo_app_data';
let todos = [];
let categories = [];
let editingId = null;
let selectedIds = new Set();

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const data = JSON.parse(raw);
    todos = data.todos || [];
    categories = data.categories || [];
  }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ todos, categories }));
}

loadData();

// Export / Import
function exportData() {
  const blob = new Blob([JSON.stringify({ todos, categories }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'todo_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出 ✓');
}

function handleImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.todos && Array.isArray(data.todos)) {
          todos = data.todos;
          categories = data.categories || [];
          updateCategories(); saveData(); renderTodos();
          showToast('数据已导入 ✓ (共 ' + todos.length + ' 条)');
        } else { showToast('无效的数据格式'); }
      } catch { showToast('文件解析失败'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Categories
function updateCategories() {
  const set = new Set(categories);
  todos.forEach(t => { if (t.category) set.add(t.category); });
  categories = [...set].sort();
}

function renderCategoryBar() {
  const el = document.getElementById('categoryBar');
  if (categories.length === 0) { el.innerHTML = ''; return; }
  const activeCat = document.getElementById('categoryFilter')?.dataset?.cat || 'all';
  el.innerHTML = `<span class="category-chip${activeCat === 'all' ? ' active' : ''}"
    onclick="filterByCategory('all')" style="font-weight:500;">全部</span>` +
    categories.map(c => {
      const count = todos.filter(t => t.category === c).length;
      const isActive = activeCat === c;
      return `<span class="category-chip${isActive ? ' active' : ''}"
        onclick="filterByCategory('${escapeHtml(c)}')">
        ${escapeHtml(c)}<span class="chip-count">${count}</span></span>`;
    }).join('');
}

function filterByCategory(cat) {
  const el = document.getElementById('categoryFilter');
  if (!el) {
    const hidden = document.createElement('input');
    hidden.type = 'hidden'; hidden.id = 'categoryFilter'; hidden.dataset.cat = cat;
    document.body.appendChild(hidden);
  } else { el.dataset.cat = cat; }
  renderTodos();
}

// Rendering
function getFilteredTodos() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const statusFilter = document.getElementById('statusFilter')?.value || 'all';
  const priorityFilter = document.getElementById('priorityFilter')?.value || 'all';
  const categoryFilter = document.getElementById('categoryFilter')?.dataset?.cat || 'all';
  const today = new Date().toISOString().slice(0,10);

  let filtered = [...todos];
  if (search) {
    filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(search) ||
      (t.tags || []).some(tag => tag.toLowerCase().includes(search)) ||
      (t.category || '').toLowerCase().includes(search)
    );
  }
  if (statusFilter === 'active') filtered = filtered.filter(t => !t.completed);
  else if (statusFilter === 'completed') filtered = filtered.filter(t => t.completed);
  else if (statusFilter === 'overdue') filtered = filtered.filter(t => !t.completed && t.dueDate && t.dueDate < today);
  if (priorityFilter !== 'all') filtered = filtered.filter(t => t.priority === priorityFilter);
  if (categoryFilter !== 'all') filtered = filtered.filter(t => t.category === categoryFilter);
  filtered.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  return filtered;
}

function renderTodos() {
  const list = document.getElementById('todoList');
  const filtered = getFilteredTodos();
  renderCategoryBar();
  updateStats(filtered);
  updateCategoryDatalist();

  if (filtered.length === 0) {
    const search = document.getElementById('searchInput')?.value || '';
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">${search ? '🔍' : '🐣'}</div>
      <p>${search ? '没有匹配的待办事项' : '还没有待办事项，点击「新建」开始吧~'}</p>
    </div>`;
    return;
  }

  const today = new Date().toISOString().slice(0,10);

  list.innerHTML = filtered.map((t, i) => {
    const completedClass = t.completed ? ' completed' : '';
    const overdueClass = !t.completed && t.dueDate && t.dueDate < today ? ' overdue' : '';

    let dueHtml = '';
    if (t.dueDate) {
      let dueClass = 'normal', dueLabel = t.dueDate;
      if (t.dueDate === today) { dueClass = 'today'; dueLabel = '今天到期'; }
      else if (t.dueDate < today && !t.completed) { dueClass = 'overdue'; dueLabel = '已逾期 ' + t.dueDate; }
      else if (t.dueDate < today && t.completed) { dueLabel = t.dueDate; }
      dueHtml = `<span class="due-date ${dueClass}">📅 ${dueLabel}</span>`;
    }

    let reminderHtml = '';
    if (t.reminder) {
      const rmDate = new Date(t.reminder);
      reminderHtml = `<span class="reminder-tag">⏰ ${rmDate.toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>`;
    }

    let priorityHtml = '';
    if (t.priority && t.priority !== 'low') {
      const label = t.priority === 'high' ? '高' : '中';
      priorityHtml = `<span class="tag tag-priority-${t.priority}">${label}</span>`;
    }

    let categoryHtml = '';
    if (t.category) categoryHtml = `<span class="tag tag-category">${escapeHtml(t.category)}</span>`;

    let tagsHtml = (t.tags || []).map(tag =>
      `<span class="tag tag-category">${escapeHtml(tag)}</span>`
    ).join('');

    const isSelected = selectedIds.has(t.id);
    const selectHtml = `<div class="select-check${isSelected ? ' selected' : ''}" onclick="event.stopPropagation();toggleSelect('${t.id}')"></div>`;

    return `<div class="todo-item${completedClass}${overdueClass}" draggable="true"
      data-id="${t.id}" data-index="${i}"
      ondragstart="handleDragStart(event)" ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" ondragend="handleDragEnd(event)">
      <span class="drag-handle" onmousedown="event.stopPropagation()">⋮⋮</span>
      ${selectHtml}
      <div class="checkbox${t.completed ? ' checked' : ''}" onclick="toggleComplete('${t.id}')"></div>
      <div class="todo-content" ondblclick="openEditModal('${t.id}')">
        <span class="todo-title">${escapeHtml(t.title)}</span>
        <div class="todo-meta">
          ${dueHtml} ${reminderHtml} ${priorityHtml} ${categoryHtml} ${tagsHtml}
        </div>
      </div>
      <div class="todo-actions">
        <button class="btn-edit" onclick="openEditModal('${t.id}')" title="编辑">✎</button>
        <button class="btn-delete" onclick="deleteTodo('${t.id}')" title="删除">✕</button>
      </div>
    </div>`;
  }).join('');

  updateBatchBar();
}

function updateStats(filtered) {
  const total = todos.length;
  const completed = todos.filter(t => t.completed).length;
  const active = total - completed;
  document.getElementById('statsText').textContent = `共 ${total} 项 · ${active} 进行中 · ${completed} 已完成`;
}

function updateBatchBar() {
  const bar = document.getElementById('batchActions');
  bar.classList.toggle('hidden', selectedIds.size === 0);
}

function updateCategoryDatalist() {
  const dl = document.getElementById('categoryDatalist');
  dl.innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">`).join('');
}

// Actions
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新建待办';
  document.getElementById('todoTitle').value = '';
  document.getElementById('todoPriority').value = 'medium';
  document.getElementById('todoDueDate').value = '';
  document.getElementById('todoReminder').value = '';
  document.getElementById('todoCategory').value = '';
  document.getElementById('todoTags').value = '';
  document.getElementById('todoModal').style.display = 'flex';
  document.getElementById('todoTitle').focus();
}

function openEditModal(id) {
  const t = todos.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑待办';
  document.getElementById('todoTitle').value = t.title;
  document.getElementById('todoPriority').value = t.priority || 'medium';
  document.getElementById('todoDueDate').value = t.dueDate || '';
  document.getElementById('todoReminder').value = t.reminder ? t.reminder.slice(0,16) : '';
  document.getElementById('todoCategory').value = t.category || '';
  document.getElementById('todoTags').value = (t.tags || []).join(', ');
  document.getElementById('todoModal').style.display = 'flex';
  document.getElementById('todoTitle').focus();
}

function closeModal() {
  document.getElementById('todoModal').style.display = 'none';
  editingId = null;
}

function saveTodo() {
  const title = document.getElementById('todoTitle').value.trim();
  if (!title) { showToast('请输入标题'); return; }

  const priority = document.getElementById('todoPriority').value;
  const dueDate = document.getElementById('todoDueDate').value;
  const reminder = document.getElementById('todoReminder').value;
  const category = document.getElementById('todoCategory').value.trim();
  const tagsStr = document.getElementById('todoTags').value.trim();
  const tags = tagsStr ? tagsStr.split(',').map(s => s.trim()).filter(Boolean) : [];

  if (editingId) {
    const t = todos.find(x => x.id === editingId);
    if (t) {
      t.title = title; t.priority = priority;
      t.dueDate = dueDate || null; t.reminder = reminder || null;
      t.category = category || null; t.tags = tags;
    }
  } else {
    const maxOrder = todos.reduce((max, t) => Math.max(max, t.order ?? 0), 0);
    todos.push({
      id: generateId(), title, completed: false, priority,
      dueDate: dueDate || null, reminder: reminder || null,
      category: category || null, tags, order: maxOrder + 1,
      createdAt: new Date().toISOString()
    });
  }

  updateCategories(); saveData(); closeModal(); renderTodos();
  showToast(editingId ? '已更新 ✓' : '已添加 ✓');
  editingId = null;

  // Request notification permission if reminder is set
  if (reminder && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function toggleComplete(id) {
  const t = todos.find(x => x.id === id);
  if (t) { t.completed = !t.completed; saveData(); renderTodos(); }
}

function deleteTodo(id) {
  if (!confirm('确定要删除这条待办吗？')) return;
  todos = todos.filter(t => t.id !== id);
  selectedIds.delete(id);
  updateCategories(); saveData(); renderTodos();

function toggleSelectAll() {

function batchMarkComplete() {

  todos.forEach(t => { if (selectedIds.has(t.id)) t.completed = true; });

  showToast('已批量完成 ✓');
}

function batchDelete() {
  if (selectedIds.size === 0) return;

  todos = todos.filter(t => !selectedIds.has(t.id));
  selectedIds.clear(); updateCategories(); saveData(); renderTodos();
  showToast('已批量删除');
}

// Drag & Drop
let dragSrcIndex = null;

function handleDragStart(e) {
  dragSrcIndex = parseInt(e.target.dataset.index);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.target.closest('.todo-item')?.classList.add('drag-over');
}

function handleDragLeave(e) {
  e.target.closest('.todo-item')?.classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  e.target.closest('.todo-item')?.classList.remove('drag-over');
  const targetIndex = parseInt(e.target.closest('.todo-item')?.dataset.index);
  if (dragSrcIndex === null || targetIndex === null || dragSrcIndex === targetIndex) return;

  const filtered = getFilteredTodos();
  const srcItem = filtered[dragSrcIndex];
  const tgtItem = filtered[targetIndex];
  if (!srcItem || !tgtItem) return;

  const srcOrder = srcItem.order;
  const tgtOrder = tgtItem.order;
  if (dragSrcIndex < targetIndex) {
    todos.forEach(t => { if (t.order > srcOrder && t.order <= tgtOrder) t.order--; });
  } else {
    todos.forEach(t => { if (t.order >= tgtOrder && t.order < srcOrder) t.order++; });
  }
  srcItem.order = tgtOrder;
  saveData(); renderTodos();
  dragSrcIndex = null;
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
  dragSrcIndex = null;
}

// Canvas setup
function initCanvas() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', doDraw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawTouch(e.touches[0]); });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); doDrawTouch(e.touches[0]); });
  canvas.addEventListener('touchend', stopDraw);
  canvas.addEventListener('touchcancel', stopDraw);
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function startDraw(e) {
  if (!myTurn) return;
  isDrawing = true;
  const pos = getCanvasPos(e);
  lastX = pos.x; lastY = pos.y;
  sendDrawData({ act: 'start', x: lastX, y: lastY, c: drawColor, s: drawSize, t: drawTool });
}

function doDraw(e) {
  if (!isDrawing || !myTurn) return;
  const pos = getCanvasPos(e);
  drawLine(lastX, lastY, pos.x, pos.y, drawColor, drawSize, drawTool);
  sendDrawData({ act: 'move', x: pos.x, y: pos.y });
  lastX = pos.x; lastY = pos.y;
}

function startDrawTouch(t) {
  if (!myTurn) return;
  isDrawing = true;
  const pos = getCanvasPos(t);
  lastX = pos.x; lastY = pos.y;
  sendDrawData({ act: 'start', x: lastX, y: lastY, c: drawColor, s: drawSize, t: drawTool });
}

function doDrawTouch(t) {
  if (!isDrawing || !myTurn) return;
  const pos = getCanvasPos(t);
  drawLine(lastX, lastY, pos.x, pos.y, drawColor, drawSize, drawTool);
  sendDrawData({ act: 'move', x: pos.x, y: pos.y });
  lastX = pos.x; lastY = pos.y;
}

function stopDraw() {
  if (!isDrawing) return;
  isDrawing = false;
  sendDrawData({ act: 'end' });
}

function drawLine(x1, y1, x2, y2, color, size, tool) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : color;
  ctx.lineWidth = tool === 'eraser' ? size * 3 : size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function clearCanvas(send = true) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (send && myTurn) sendDrawData({ act: 'clear' });
}

    }
  ],

};

function initPeer(customId) {
  if (peer) { peer.destroy(); peer = null; }
  connections = {};
  myPeerId = null;

  const opts = { debug: 0, config: ICE_SERVERS };
  peer = customId ? new Peer(customId, opts) : new Peer(opts);

  peer.on('open', (id) => {
    myPeerId = id;
    console.log('PeerJS ready, ID:', id);
  });

  peer.on('connection', (conn) => {
    console.log('Incoming connection from:', conn.peer);
    setupConnection(conn);
  });

  peer.on('error', (err) => {
    console.error('Peer error:', err);
    if (err.type === 'unavailable-id') {
      showToast('房间号已被占用，请换一个');
      resetToLobby();
    } else if (err.type === 'peer-unavailable') {
      showToast('无法连接到该房间，请确认房间号正确且房主在线');
    } else if (err.type === 'server-error') {
      showToast('信令服务器连接失败，请检查网络后刷新重试');
    } else if (err.type === 'network') {
      showToast('网络连接失败，请检查网络');
    } else {
      showToast('连接出错: ' + (err.message || err.type));
    }
  });

  peer.on('disconnected', () => {
    console.log('Peer disconnected, trying to reconnect...');
    if (peer && !peer.destroyed) {
      setTimeout(() => {
        if (peer && !peer.destroyed) peer.reconnect();
      }, 1000);
    }
  });
}

function setupConnection(conn) {
  connections[conn.peer] = conn;

  // HOST: immediately add placeholder when someone connects
  if (isRoomHost && !players[conn.peer]) {
    players[conn.peer] = { name: '加入中...', score: 0, isDrawer: false };
    broadcastPlayerList();
    updateGameUI();
  }

  conn.on('open', () => {
    // Send our info to the other peer
    conn.send({ type: 'join_info', name: playerName, peerId: myPeerId, isHost: isRoomHost });
    // Host sends current room state to the new peer
    if (isRoomHost) {
      conn.send({ type: 'player_list', players, roomName });
      if (roomName) conn.send({ type: 'room_name', roomName });
    }
  });

  conn.on('data', (data) => {
    handleGameData(data, conn.peer);
  });

  conn.on('close', () => {
    handlePlayerDisconnect(conn.peer);
  });

  conn.on('error', (err) => {
    console.error('Conn error:', err);
    delete connections[conn.peer];
    delete players[conn.peer];
    broadcastPlayerList();
    updateGameUI();
  });
}

function broadcast(data) {
  const conns = Object.values(connections);
  if (conns.length === 0) {
    console.warn('[broadcast] No connections to send:', data.type);
    return;
  }
  conns.forEach(conn => {
    try {
      conn.send(data);
    } catch(e) {
      console.error('[broadcast] Send failed for', data.type, e);
    }
  });
}

function handleGameData(data, fromPeerId) {
  switch (data.type) {
    case 'join_info':
      // Update or create player entry
      const prevName = players[data.peerId]?.name || '';
      players[data.peerId] = {
        name: data.name,
        score: players[data.peerId]?.score || 0,
        isDrawer: players[data.peerId]?.isDrawer || false
      };
      broadcastPlayerList();
      if (prevName !== data.name) {
        addChatMessage('system', data.name + ' 加入了房间 🎉');
      }
      updateGameUI();
      break;

    case 'player_list':
      players = data.players;
      if (data.roomName) roomName = data.roomName;
      updateGameUI();
      break;

    case 'host_transfer':
      handleHostTransfer(data);
      break;

    case 'room_name':
      roomName = data.roomName;
      updateGameUI();
      break;

    case 'start_game':
      gameActive = true;
      totalRounds = data.totalRounds || 0;
      currentRound = 0;
      roundEnded = false;
      guessedPeers.clear();
      document.getElementById('gamePlayArea').style.display = 'block';
      document.getElementById('startGameBtn').style.display = 'none';
      document.getElementById('roundDisplay').textContent = '';
      addChatMessage('system', '🎮 游戏开始！');
      break;

    case 'new_round':
      currentWord = data.word;
      players = data.players;
      myTurn = data.drawerPeerId === myPeerId;
      roundTimeLeft = data.roundTime;
      currentRound = data.currentRound || 0;
      totalRounds = data.totalRounds || 0;
      roundEnded = false;
      guessedPeers.clear();
      document.getElementById('wordDisplay').textContent = myTurn
        ? '🎨 你的词: ' + currentWord
        : '🔍 提示: ' + '_ '.repeat(currentWord.length).trim();
      document.getElementById('roundDisplay').textContent = totalRounds > 0
        ? '第 ' + (currentRound + 1) + '/' + totalRounds + ' 局'
        : '第 ' + (currentRound + 1) + ' 局';
      clearCanvas();
      updateGameUI();
      startRoundTimer(data.roundTime);
      if (myTurn) {
        addChatMessage('system', '第 ' + (currentRound + 1) + ' 局 | 轮到你画画！词语: ' + currentWord);
      } else {
        addChatMessage('system', '第 ' + (currentRound + 1) + ' 局 | ' + data.drawerName + ' 正在画画，快来猜！');
      }
      break;

    case 'round_end':
      roundEnded = true;
      currentRound = data.currentRound || (currentRound + 1);
      players = data.players;
      clearCanvas();
      updateGameUI();
      if (data.word) addChatMessage('system', '答案揭晓: ' + data.word);
      if (roundTimer) { clearInterval(roundTimer); roundTimer = null; }
      document.getElementById('timerDisplay').textContent = '⏱ --';
      break;

    case 'draw':
      handleRemoteDraw(data);
      break;

    case 'guess':
      console.log('[guess] from', data.name, 'correct:', data.correct, 'isRoomHost:', isRoomHost, 'roundEnded:', roundEnded);
      if (data.correct) {
        guessedPeers.add(data.peerId);
        players = data.players;
        addChatMessage('correct', data.name + ' 猜对了！🎉 (+' + data.points + '分)');
        updateGameUI();
        console.log('[guess] guessedPeers.size:', guessedPeers.size, 'nonDrawers:', Object.keys(players).length - 1);
        if (isRoomHost && !roundEnded && guessedPeers.size >= Object.keys(players).length - 1) {
          console.log('[guess] Triggering endRound from host');
          endRound();
        }
      } else {
        addChatMessage('normal', data.name + ': ' + data.text);
      }
      break;

    case 'game_over':
      gameActive = false;
      roundEnded = true;
      if (roundTimer) { clearInterval(roundTimer); roundTimer = null; }
      document.getElementById('startGameBtn').style.display = isRoomHost ? 'block' : 'none';
      document.getElementById('gamePlayArea').style.display = 'none';
      document.getElementById('wordDisplay').textContent = '游戏结束';
      document.getElementById('timerDisplay').textContent = '⏱ --';
      myTurn = false;
      guessedPeers.clear();
      players = data.players;
      const scores = Object.values(players).sort((a, b) => b.score - a.score);
      addChatMessage('system', '🏆 游戏结束！' + (data.reason ? '(' + data.reason + ')' : ''));
      if (scores[0]) addChatMessage('system', '🥇 第一名: ' + scores[0].name + ' (' + scores[0].score + '分)');
      updateGameUI();
      break;

    case 'player_leave':
      handlePlayerDisconnect(data.peerId);
      break;

    case 'chat':
      addChatMessage('normal', data.name + ': ' + data.text);
      break;
  }
}

function handleRemoteDraw(data) {
  switch (data.act) {
    case 'start':
      lastX = data.x; lastY = data.y;
      ctx.beginPath();
      ctx.moveTo(data.x, data.y);
      ctx.strokeStyle = data.t === 'eraser' ? '#ffffff' : data.c;
      ctx.lineWidth = data.t === 'eraser' ? data.s * 3 : data.s;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      break;
    case 'move':
      drawLine(lastX, lastY, data.x, data.y, data.c, data.s, data.t);
      lastX = data.x; lastY = data.y;
      break;
    case 'end':
      break;
    case 'clear':
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      break;
  }
}

function sendDrawData(data) {
  broadcast({ type: 'draw', ...data });
}

function startRoundTimer(seconds) {

    if (roundTimeLeft <= 0) {

      roundTimer = null;
      if (isRoomHost && !roundEnded) endRound();

}

function updateTimerDisplay() {

// Room management
function createRoom() {
  playerName = document.getElementById('gameNickname').value.trim();
  if (!playerName) { showToast('请输入昵称'); return; }

  roomName = document.getElementById('createRoomName').value.trim();
  let customCode = document.getElementById('createRoomCode').value.trim();

  // Validate custom code: alphanumeric, hyphens, underscores only
  if (customCode && !/^[a-zA-Z0-9_-]+$/.test(customCode)) {
    showToast('房间号只能包含英文、数字、下划线和连字符'); return;
  }

  isRoomHost = true;
  initPeer(customCode || undefined);

  const checkPeer = setInterval(() => {
    if (myPeerId) {
      clearInterval(checkPeer);
      roomId = myPeerId;
      players[myPeerId] = { name: playerName, score: 0, isDrawer: false };

      document.getElementById('roomNameDisplay').textContent = roomName || playerName + '的房间';
      document.getElementById('roomCodeDisplay').textContent = roomId;
      document.getElementById('gameLobby').style.display = 'none';
      document.getElementById('gameRoom').style.display = 'block';
      document.getElementById('startGameBtn').style.display = 'block';

      // Update URL hash for sharing
      window.location.hash = roomId;
      saveRoomState();

      updateGameUI();
      addChatMessage('system', '房间已创建！点击「🔗 分享」复制链接发给朋友');
    }
  }, 200);
}

let joinRetryCount = 0;
const MAX_JOIN_RETRIES = 3;

function doJoinRoom() {
  const code = roomId;
  if (!code || !peer || peer.destroyed) return;

  addChatMessage('system', '正在连接房间... (尝试 ' + (joinRetryCount + 1) + '/' + MAX_JOIN_RETRIES + ')');

  const conn = peer.connect(code, {
    reliable: true,
    serialization: 'json'
  });
  setupConnection(conn);

  // Check if connection succeeded
  setTimeout(() => {
    if (Object.keys(connections).length === 0) {
      joinRetryCount++;
      if (joinRetryCount < MAX_JOIN_RETRIES) {
        addChatMessage('system', '连接失败，正在重试...');
        // Destroy old peer and create a new one for fresh ICE candidates
        if (peer) { peer.destroy(); peer = null; }
        myPeerId = null;
        initPeer();
        const waitForPeer = setInterval(() => {
          if (myPeerId) {
            clearInterval(waitForPeer);
            setTimeout(() => doJoinRoom(), 500);
          }
        }, 200);
      } else {
        addChatMessage('system', '多次连接失败，请确认：');
        addChatMessage('system', '1. 房间号是否正确');
        addChatMessage('system', '2. 房主是否在线');
        addChatMessage('system', '3. 双方网络是否正常');
        addChatMessage('system', '💡 提示：房主和客人都尝试关闭并重新创建/加入房间');
      }
    }
  }, 10000);
}

function joinRoom() {
  playerName = document.getElementById('gameNickname').value.trim();
  const code = document.getElementById('joinRoomCode').value.trim();
  if (!playerName) { showToast('请输入昵称'); return; }
  if (!code) { showToast('请输入房间号'); return; }

  isRoomHost = false;
  joinRetryCount = 0;
  initPeer();

  const checkPeer = setInterval(() => {
    if (myPeerId) {
      clearInterval(checkPeer);
      roomId = code;
      document.getElementById('roomNameDisplay').textContent = '加入的房间';
      document.getElementById('roomCodeDisplay').textContent = code;
      document.getElementById('gameLobby').style.display = 'none';
      document.getElementById('gameRoom').style.display = 'block';
      document.getElementById('startGameBtn').style.display = 'none';
      window.location.hash = code;
      saveRoomState();
      doJoinRoom();
    }
  }, 200);
}

function reconnectRoom() {
  // Re-establish connections without leaving the room
  if (isRoomHost) {
    // Host: just wait for reconnections. Player list stays.
    addChatMessage('system', '等待玩家重新连接...');
    updateGameUI();
  } else {
    // Guest: try to reconnect to host
    if (!roomId) return;
    addChatMessage('system', '重新连接到房间...');
    joinRetryCount = 0;
    // Close existing connections
    Object.values(connections).forEach(c => { try { c.close(); } catch(e){} });
    connections = {};
    // Re-init peer and connect
    if (peer && !peer.destroyed) { peer.destroy(); peer = null; }
    myPeerId = null;
    initPeer();
    const waitForPeer = setInterval(() => {
      if (myPeerId) {
        clearInterval(waitForPeer);
        doJoinRoom();
      }
    }, 200);
  }
}

function leaveRoom() {
  // Host transfer: pick the first remaining player as new host
  if (isRoomHost) {
    const otherIds = Object.keys(players).filter(pid => pid !== myPeerId);
    if (otherIds.length > 0 && gameActive) {
      const newHostId = otherIds[0];
      broadcast({ type: 'host_transfer', newHostId, players, currentWord, currentRound, totalRounds, roundTimeLeft, gameActive, roundEnded, guessedPeers: [...guessedPeers] });
    } else if (gameActive) {
      broadcast({ type: 'game_over', players, reason: '房主离开' });
    }
  }
  broadcast({ type: 'player_leave', peerId: myPeerId });
  resetToLobby();
}

function handlePlayerDisconnect(peerId) {
  const name = players[peerId]?.name || peerId;
  const wasHost = players[peerId]?.isHost || (isRoomHost && peerId === Object.keys(players).find(pid => players[pid]?.isHost));
  delete connections[peerId];
  delete players[peerId];

  if (Object.keys(players).length === 0 || (Object.keys(players).length === 1 && players[myPeerId])) {
    // Room is empty (or only me left) — reset game
    if (gameActive) {
      addChatMessage('system', '所有其他玩家已离开，游戏结束');
      gameActive = false;
      document.getElementById('gamePlayArea').style.display = 'none';
      document.getElementById('startGameBtn').style.display = isRoomHost ? 'block' : 'none';
    }
  }

  broadcastPlayerList();
  updateGameUI();
  addChatMessage('system', name + ' 离开了房间');

  // Host transfer: if the leaving player was host, pick new host
  if (wasHost) {
    const otherIds = Object.keys(players);
    if (otherIds.length > 0 && otherIds[0] === myPeerId) {
      isRoomHost = true;
      document.getElementById('startGameBtn').style.display = 'block';
      addChatMessage('system', '🎩 房主离开，你成为新房主！');
      if (gameActive && roundEnded) {
        // Previous round ended, host can start next round
      }
    }
  }
}

function handleHostTransfer(data) {
  if (data.newHostId === myPeerId) {
    isRoomHost = true;
    document.getElementById('startGameBtn').style.display = 'block';
    addChatMessage('system', '🎩 你成为了新房主！');
    // Restore game state
    if (data.gameActive) {
      players = data.players;
      currentWord = data.currentWord;
      currentRound = data.currentRound;
      totalRounds = data.totalRounds;
      roundTimeLeft = data.roundTimeLeft;
      gameActive = data.gameActive;
      roundEnded = data.roundEnded;
      guessedPeers = new Set(data.guessedPeers || []);
      document.getElementById('gamePlayArea').style.display = 'block';
      myTurn = players[myPeerId]?.isDrawer || false;
      updateGameUI();
      updateTimerDisplay();
      if (!roundEnded) {
        startRoundTimer(roundTimeLeft);
      }
    }
  } else {
    addChatMessage('system', '房主已离开，' + (players[data.newHostId]?.name || '另一玩家') + ' 成为新房主');
    if (data.gameActive) {
      players = data.players;
      updateGameUI();
    }
  }
}

function copyShareLink() {
  const url = window.location.origin + window.location.pathname + '#' + roomId;
  navigator.clipboard.writeText(url).then(
    () => showToast('分享链接已复制 ✓ 发给朋友即可'),
    () => showToast('复制失败，请手动复制地址栏链接')
  );
}

// Game flow
function startGame() {
  if (Object.keys(players).length < 2) {
    showToast('至少需要2名玩家'); return;
  }
  totalRounds = parseInt(document.getElementById('totalRoundsSelect').value);
  currentRound = 0;
  roundEnded = false;
  // Reset scores, make first player (by insertion order) the first drawer
  const playerIds = Object.keys(players);
  playerIds.forEach((pid, i) => {
    players[pid].score = 0;
    players[pid].isDrawer = (i === 0);
  });
  guessedPeers.clear();
  broadcast({ type: 'start_game', totalRounds });
  gameActive = true;
  document.getElementById('gamePlayArea').style.display = 'block';
  document.getElementById('startGameBtn').style.display = 'none';
  document.getElementById('roundDisplay').textContent = '';
  const roundLabel = totalRounds > 0 ? '共 ' + totalRounds + ' 局' : '无限局';
  addChatMessage('system', '🎮 游戏开始！' + playerIds.length + ' 名玩家 · ' + roundLabel);
  newRound();
}

function newRound() {
  console.log('[newRound] currentRound:', currentRound, 'players:', Object.keys(players).length, 'gameActive:', gameActive);
  roundEnded = false;
  const playerIds = Object.keys(players);
  const drawerIdx = currentRound % playerIds.length;
  const drawerPeerId = playerIds[drawerIdx];
  console.log('[newRound] drawerIdx:', drawerIdx, 'drawer:', players[drawerPeerId]?.name);

  playerIds.forEach(pid => { players[pid].isDrawer = (pid === drawerPeerId); });
  guessedPeers.clear();

  currentWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
  const roundTime = 80;

  broadcast({
    type: 'new_round', word: currentWord, players,
    drawerPeerId, drawerName: players[drawerPeerId].name,
    roundTime, currentRound, totalRounds
  });

  myTurn = drawerPeerId === myPeerId;
  document.getElementById('wordDisplay').textContent = myTurn
    ? '🎨 你的词: ' + currentWord
    : '🔍 提示: ' + '_ '.repeat(currentWord.length).trim();
  document.getElementById('roundDisplay').textContent = totalRounds > 0
    ? '第 ' + (currentRound + 1) + '/' + totalRounds + ' 局'
    : '第 ' + (currentRound + 1) + ' 局';
  clearCanvas();
  updateGameUI();
  startRoundTimer(roundTime);

  if (myTurn) {
    addChatMessage('system', '第 ' + (currentRound + 1) + ' 局 | 轮到你画画！词语: ' + currentWord);
  } else {
    addChatMessage('system', '第 ' + (currentRound + 1) + ' 局 | ' + players[drawerPeerId].name + ' 正在画画，快来猜！');
  }
}

function endRound() {
  console.log('[endRound] called, roundEnded:', roundEnded, 'gameActive:', gameActive, 'isRoomHost:', isRoomHost);
  if (roundEnded) { console.log('[endRound] Already ended, returning'); return; }
  roundEnded = true;
  if (roundTimer) { clearInterval(roundTimer); roundTimer = null; }

  currentRound++;
  broadcast({ type: 'round_end', word: currentWord, players, currentRound, totalRounds });
  addChatMessage('system', '─── 答案揭晓: ' + currentWord + ' ───');
  clearCanvas();
  myTurn = false;
  document.getElementById('wordDisplay').textContent = '答案: ' + currentWord;
  document.getElementById('timerDisplay').textContent = '⏱ --';
  document.getElementById('timerDisplay').style.color = 'var(--text-tertiary)';

  // Check if game should end
  if (totalRounds > 0 && currentRound >= totalRounds) {
    setTimeout(() => {
      gameActive = false;
      broadcast({ type: 'game_over', players });
      addChatMessage('system', '🏆 游戏结束！全部 ' + totalRounds + ' 局已完成');
      const scores = Object.values(players).sort((a, b) => b.score - a.score);
      if (scores[0]) addChatMessage('system', '🥇 第一名: ' + scores[0].name + ' (' + scores[0].score + '分)');
      document.getElementById('startGameBtn').style.display = isRoomHost ? 'block' : 'none';
      document.getElementById('gamePlayArea').style.display = 'none';
      document.getElementById('wordDisplay').textContent = '游戏结束';
      updateGameUI();
    }, 3000);
  } else {
    setTimeout(() => {
      if (gameActive && isRoomHost && roundEnded) newRound();
    }, 3000);
  }
}

function sendGuess() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || myTurn) return;
  input.value = '';
  input.focus();

  if (!gameActive) {
    broadcast({ type: 'chat', name: playerName, text });
    addChatMessage('normal', '你: ' + text);
    return;
  }

  if (roundEnded) {
    addChatMessage('system', '本局已结束，等待下一局...');
    return;
  }

  if (guessedPeers.has(myPeerId)) {
    addChatMessage('system', '你已经猜对了，等下一轮吧~');
    return;
  }

  const correct = text === currentWord;
  console.log('[sendGuess] text:', text, 'currentWord:', currentWord, 'correct:', correct, 'isRoomHost:', isRoomHost, 'myTurn:', myTurn);

  if (correct) {
    guessedPeers.add(myPeerId);
    const points = 10 + Math.max(0, roundTimeLeft);
    players[myPeerId].score = (players[myPeerId].score || 0) + points;

    const drawerId = Object.keys(players).find(pid => players[pid].isDrawer);
    if (drawerId && players[drawerId]) {
      players[drawerId].score = (players[drawerId].score || 0) + 5;
    }

    broadcast({
      type: 'guess', name: playerName, peerId: myPeerId,
      text: '（猜对了！）', correct: true, points, players
    });
    addChatMessage('correct', '🎉 你猜对了！+' + points + '分');
    updateGameUI();

    // Trigger round end check
    const nonDrawerCount = Object.keys(players).length - 1;
    console.log('[sendGuess] guessedPeers.size:', guessedPeers.size, 'nonDrawerCount:', nonDrawerCount);
    if (isRoomHost && !roundEnded && guessedPeers.size >= nonDrawerCount) {
      console.log('[sendGuess] Host guessed correctly, ending round');
      endRound();
    } else if (!isRoomHost && guessedPeers.size >= nonDrawerCount) {
      console.log('[sendGuess] Guest guessed, waiting for host to end round');
    }
  } else {
    broadcast({ type: 'guess', name: playerName, peerId: myPeerId, text, correct: false });
    addChatMessage('normal', '你: ' + text);
  }
}

function addChatMessage(cls, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + cls;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function updateGameUI() {
  // Room name
  const rn = document.getElementById('roomNameDisplay');
  if (rn && roomName) rn.textContent = roomName;

  // Player list
  const pl = document.getElementById('playerList');
  pl.innerHTML = Object.entries(players).map(([pid, p]) => {
    let cls = 'player-badge';
    if (p.isDrawer) cls += ' is-drawer';
    if (pid === myPeerId) cls += ' me';
    const icon = p.isDrawer ? '🎨 ' : '';
    const me = pid === myPeerId ? ' (我)' : '';
    return `<span class="${cls}">${icon}${escapeHtml(p.name)}${me}</span>`;
  }).join('');

  // Score list
  const sl = document.getElementById('scoreList');
  const sorted = Object.values(players).sort((a, b) => b.score - a.score);
  sl.innerHTML = sorted.map((p, i) => {
    const medals = ['🥇', '🥈', '🥉'];
    return `<div class="score-row">${(medals[i] || '')} ${escapeHtml(p.name)} <span>${p.score}分</span></div>`;
  }).join('');

  // Canvas
  canvas.style.opacity = myTurn ? '1' : '0.85';
  canvas.style.cursor = myTurn ? 'crosshair' : 'default';

  // Room code
  const cd = document.getElementById('roomCodeDisplay');
  if (cd && roomId) cd.textContent = roomId;
}

// === Session persistence for page refresh ===
function saveRoomState() {
  if (!roomId) return;
  const state = {
    playerName, roomId, roomName, isRoomHost,
    savedAt: Date.now()
  };
  sessionStorage.setItem('game_room_state', JSON.stringify(state));
}

function restoreRoomState() {
  const raw = sessionStorage.getItem('game_room_state');
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    // Only restore if saved within last 30 minutes
    if (Date.now() - state.savedAt > 30 * 60 * 1000) {
      sessionStorage.removeItem('game_room_state');
      return false;
    }
    return state;
  } catch { return false; }
}

// Save state before page unload
window.addEventListener('beforeunload', () => {
  saveRoomState();
});

// Also save periodically while in room
setInterval(() => {
  if (roomId && (document.getElementById('gameRoom').style.display !== 'none')) {
    saveRoomState();
  }
}, 5000);

// Auto-join from URL hash or session state
function checkUrlHash() {
  const hash = window.location.hash.slice(1);

  // First check for session-based room recovery (page refresh)
  const savedState = restoreRoomState();
  if (savedState && !hash) {
    // User was in a room before refresh — auto rejoin
    switchToGameTab();
    playerName = savedState.playerName;
    roomName = savedState.roomName || '';
    document.getElementById('gameNickname').value = playerName;
    if (savedState.isRoomHost) {
      document.getElementById('createRoomName').value = roomName;
      document.getElementById('createRoomCode').value = savedState.roomId;
      addGameToast('检测到之前的房间，正在重新创建...');
      createRoom();
    } else {
      document.getElementById('joinRoomCode').value = savedState.roomId;
      addGameToast('检测到之前的房间，输入昵称后点击加入');
    }
    return;
  }

  // URL hash sharing link
  if (hash && hash.length >= 4 && hash.length <= 50 && /^[a-zA-Z0-9_-]+$/.test(hash)) {
    switchToGameTab();
    document.getElementById('joinRoomCode').value = hash;
    document.getElementById('gameNickname').focus();
    addGameToast('检测到房间链接，输入昵称后点击加入');
  }
}

function switchToGameTab() {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const gameTabBtn = document.querySelector('.tab-btn:nth-child(2)');
  if (gameTabBtn) gameTabBtn.classList.add('active');
  document.getElementById('panel-game').classList.add('active');
}

function addGameToast(msg) {
  showToast(msg);
}

	// Auth startup + canvas init
	async function startApp() {
	  initCanvas();
	  window.addEventListener("hashchange", checkUrlHash);
	  const authed = await verifyToken();
	  if (authed) {
	    document.getElementById("authOverlay").style.display = "none";
	    initApp();
	    setTimeout(checkUrlHash, 500);
	  } else {
	    document.getElementById("authOverlay").style.display = "flex";
	  }
	}
	window.addEventListener("load", startApp);
</script>
